services:
  # --- USER DOMAIN ---
  - type: web
    name: veloura-user-frontend
    runtime: static
    buildCommand: ""
    staticPublishPath: user/frontend
    headers:
      - key: Access-Control-Allow-Origin
        value: "*"

  - type: web
    name: veloura-user-backend
    runtime: python
    buildCommand: pip install -r user/requirements.txt
    startCommand: ./user/start.sh
    envVars:
      - key: PORT
        value: 5000

  # --- ADMIN DOMAIN ---
  - type: web
    name: veloura-admin-frontend
    runtime: static
    buildCommand: ""
    staticPublishPath: admin/frontend
    headers:
      - key: Access-Control-Allow-Origin
        value: "*"

  - type: web
    name: veloura-admin-backend
    runtime: python
    buildCommand: pip install -r admin/requirements.txt
    startCommand: ./admin/start.sh
    envVars:
      - key: PORT
        value: 6000
